---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: immich
  namespace: database
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: 0.13.1
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v3.0.3
            env:
              TZ: "${TIMEZONE}"

    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-library
      configuration:
        trash:
          enabled: true
          days: 30

    valkey:
      enabled: true

    server:
      controllers:
        main:
          containers:
            main:
              env:
                DB_HOSTNAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-pguser-immich
                      key: host
                DB_PORT:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-pguser-immich
                      key: port
                DB_USERNAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-pguser-immich
                      key: user
                DB_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-pguser-immich
                      key: password
                DB_DATABASE_NAME:
                  valueFrom:
                    secretKeyRef:
                      name: postgres-pguser-immich
                      key: dbname
                DB_SSL_MODE: require
                DB_VECTOR_EXTENSION: vectorchord
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
      ingress:
        main:
          enabled: true
          className: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-production
            external-dns.alpha.kubernetes.io/target: "ingress.${SECRET_PRIVATE_DOMAIN}"
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
          hosts:
            - host: &host "photos.${SECRET_PUBLIC_DOMAIN}"
              paths:
                - path: /
                  service:
                    identifier: main
          tls:
            - hosts: [*host]
              secretName: immich-tls

    machine-learning:
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: 1Gi
                limits:
                  memory: 4Gi
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          storageClass: nfs-titan-nvme
          size: 20Gi
          accessMode: ReadWriteOnce
