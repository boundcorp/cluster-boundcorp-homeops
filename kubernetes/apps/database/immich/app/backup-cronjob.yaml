---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-library-backup
  namespace: database
spec:
  schedule: "0 1 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: amazon/aws-cli:2.15.0
              env:
                - name: AWS_DEFAULT_REGION
                  value: eu-north-1
                - name: S3_BUCKET
                  value: s3://boundcorp-backups-eu-north-1/homeops-backup-nfs
              command:
                - bash
                - -ceu
                - |
                  export AWS_ACCESS_KEY_ID
                  AWS_ACCESS_KEY_ID=$(sed -n 's/^repo1-s3-key=//p' /etc/pgbackrest/s3.conf)
                  export AWS_SECRET_ACCESS_KEY
                  AWS_SECRET_ACCESS_KEY=$(sed -n 's/^repo1-s3-key-secret=//p' /etc/pgbackrest/s3.conf)

                  errors=0
                  for directory in library upload profile; do
                    if [ ! -d "/data/$directory" ]; then
                      echo "$directory: not present yet"
                      continue
                    fi
                    aws s3 sync "/data/$directory/" "$S3_BUCKET/immich-$directory/" \
                      --delete --only-show-errors || errors=$((errors + 1))
                  done
                  [ "$errors" -eq 0 ]
              volumeMounts:
                - name: library
                  mountPath: /data
                  readOnly: true
                - name: s3-credentials
                  mountPath: /etc/pgbackrest/s3.conf
                  subPath: s3.conf
                  readOnly: true
          volumes:
            - name: library
              persistentVolumeClaim:
                claimName: immich-library
            - name: s3-credentials
              secret:
                secretName: crunchy-postgres-secret
