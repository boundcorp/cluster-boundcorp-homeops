---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homeops-infra-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: homeops-disk
      rules:
        - alert: DiskSpaceWarning
          expr: |
            (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Disk usage above 80% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
            description: "Filesystem {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."
        - alert: DiskSpaceCritical
          expr: |
            (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Disk usage above 90% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
            description: "Filesystem {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."
    - name: homeops-cpu
      rules:
        - alert: CPUSustainedHigh
          expr: |
            (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CPU sustained above 90% on {{ $labels.instance }}"
            description: "CPU usage has been {{ $value | humanizePercentage }} for 15+ minutes."
    - name: homeops-memory
      rules:
        - alert: OOMKilled
          expr: |
            increase(kube_pod_container_status_restarts_total[5m]) > 0
            and on (namespace, pod, container)
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          labels:
            severity: critical
          annotations:
            summary: "OOM kill: {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }})"
            description: "Container was OOM killed and restarted."
    - name: homeops-pods
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is not ready"
            description: "Node has been not ready for 5+ minutes."
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 5
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod crash looping: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} restarted {{ $value | humanize }} times in 15 minutes."
        - alert: PodNotReady
          expr: |
            kube_pod_status_phase{phase=~"Pending|Unknown"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod not ready: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Pod has been in {{ $labels.phase }} phase for 10+ minutes."
