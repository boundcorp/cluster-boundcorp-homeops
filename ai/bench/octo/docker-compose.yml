services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - models:/models
    # Override entrypoint — model selected at runtime via env
    # Usage: MODEL=qwen3-8b docker compose up
    # Then load a model via the API or restart with different args
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/${MODEL:-default.gguf}
      --ctx-size 8192
      --threads 12
      --batch-size 512

volumes:
  models:
    driver: local
